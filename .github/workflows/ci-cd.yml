# ─────────────────────────────────────────────────────────────
# RivHeal Website (Next.js) — CI/CD
# File: rivheal-website-next/.github/workflows/ci-cd.yml
#
# PR             → typecheck + build + Cloudflare preview URL (auto comment)
# develop branch → build (staging vars) → deploy to CF Pages staging
# main branch    → build (prod vars)    → deploy to CF Pages production (manual approval)
#
# GitHub Secrets (repo Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN    CF API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID   Your Cloudflare account ID
#
# GitHub Variables (repo Settings → Variables → Actions):
#   STAGING_API_URL         https://api-staging.rivheal.com/api/v1
#   PROD_API_URL            https://api.rivheal.com/api/v1
#   CF_PAGES_PROJECT_NAME   rivheal-website
# ─────────────────────────────────────────────────────────────
name: CI/CD — Website (Cloudflare Pages)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24"

jobs:
  # ── 1. Type Check ───────────────────────────────────────────
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── 2. Build ────────────────────────────────────────────────
  build:
    name: Build (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set env — develop (staging)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.STAGING_API_URL }}"            >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_VERSION=sha-$(git rev-parse --short HEAD)"  >> $GITHUB_ENV

      - name: Set env — main (production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.PROD_API_URL }}"               >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_VERSION=sha-$(git rev-parse --short HEAD)"  >> $GITHUB_ENV

      - name: Set env — PR (preview)
        if: github.event_name == 'pull_request'
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.STAGING_API_URL }}"            >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_VERSION=pr-${{ github.event.number }}"      >> $GITHUB_ENV

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      # Always upload — preview, staging, and prod jobs all download this
      - name: Upload CF Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-pages-${{ github.sha }}
          path: .vercel/output/static/
          retention-days: 3

  # ── 3. Preview deployment (PRs only) ───────────────────────
  preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download CF Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: cf-pages-${{ github.sha }}
          path: .vercel/output/static/

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CF_PAGES_PROJECT_NAME }} --branch=pr-${{ github.event.number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed**: ${process.env.DEPLOYMENT_URL}`
            })

  # ── 4. Deploy → Staging (develop branch) ───────────────────
  deploy-staging:
    name: Deploy → Staging (CF Pages)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.rivheal.com
    steps:
      - name: Download CF Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: cf-pages-${{ github.sha }}
          path: .vercel/output/static/

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CF_PAGES_PROJECT_NAME }} --branch=develop

  # ── 5. Deploy → Production (main branch, manual approval) ──
  deploy-prod:
    name: Deploy → Production (CF Pages)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://rivheal.com
    steps:
      - name: Download CF Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: cf-pages-${{ github.sha }}
          path: .vercel/output/static/

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CF_PAGES_PROJECT_NAME }} --branch=main
